<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nauni - Coding Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151d30;
            --accent-orange: #ff6b35; /* Basketball orange */
            --accent-glow: rgba(255, 107, 53, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #24324f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
            /* Subtle basketball court hardwood/line inspired grid background */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3.5rem 2.5rem;
            text-align: center;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                        0 0 50px var(--accent-glow);
            position: relative;
            margin: auto;
            backdrop-filter: blur(8px);
        }

        /* Top decorative "rim" accent */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-orange), transparent);
            border-radius: 0 0 4px 4px;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            background-color: rgba(255, 107, 53, 0.1);
            border: 2px dashed var(--accent-orange);
            border-radius: 50%;
